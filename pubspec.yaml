name: abhishek_attendance
description: Abhishek International Group Employee Attendance App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: 6.1.5+1
  shared_preferences: 2.5.3
  hive: 2.2.3
  hive_flutter: 1.1.0
  http: 1.5.0
  intl: 0.19.0
  image_picker: 1.1.2
  cached_network_image: 3.4.1
  fl_chart: 0.69.0
  table_calendar: 3.1.2
  lottie: 3.3.1
  shimmer: 3.0.0
  uuid: 4.5.1
  file_picker: 8.3.7
  url_launcher: 6.3.1
  flutter_svg: 2.0.17
  google_fonts: ^6.3.2
  cupertino_icons: ^1.0.8
  # ── Firebase / Firestore ──────────────────────────────────────────────────
  firebase_core: 3.6.0
  cloud_firestore: 5.4.3
  firebase_storage: 12.3.2
  firebase_messaging: 15.1.3
  flutter_local_notifications: 18.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
